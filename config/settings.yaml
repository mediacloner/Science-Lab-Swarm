# Science Lab Swarm — System Configuration

tabbyapi:
  url: "http://localhost:5000"
  api_key: ""
  timeout: 180  # Longer timeout for scientific analysis

# Model assignments (EXL2 quantized, sequential hot-swap)
models:
  pi:  # Principal Investigator
    name: "gemma-3-12b-it-exl2-4.0bpw"
    path: "models/gemma-3-12b-it-exl2-4.0bpw"
    max_seq_len: 8192
    temperature: 0.7      # Moderate creativity for hypothesis generation
    top_p: 0.9
    max_tokens: 2048      # Longer outputs for detailed analysis
  reviewer:  # Peer Reviewer
    name: "deepseek-r1-distill-qwen-14b-exl2-3.5bpw"
    path: "models/deepseek-r1-distill-qwen-14b-exl2-3.5bpw"
    max_seq_len: 8192
    temperature: 0.5      # Lower temp for critical analysis
    top_p: 0.85
    max_tokens: 2048
  methodologist:  # Statistical Methodologist
    name: "mistral-nemo-instruct-12b-exl2-4.0bpw"
    path: "models/mistral-nemo-instruct-12b-exl2-4.0bpw"
    max_seq_len: 16384    # Larger context for data-heavy analysis
    temperature: 0.4      # Low temp for precise statistical reasoning
    top_p: 0.85
    max_tokens: 2048

# Analysis workflow parameters
analysis:
  default_max_rounds: 6
  default_time_limit_minutes: 30
  recent_turns_window: 3
  summary_every_n_turns: 3
  repetition_threshold: 0.85
  repetition_max_consecutive: 3
  challenge_every_n: 3          # Devil's advocate for groupthink prevention

# Document ingestion settings
ingestion:
  supported_formats:
    - ".pdf"
    - ".docx"
    - ".txt"
    - ".md"
    - ".csv"
    - ".xlsx"
    - ".bib"
  chunk_size: 512               # Tokens per chunk
  chunk_overlap: 64             # Token overlap between chunks
  embedding_model: "all-MiniLM-L6-v2"  # CPU-only embeddings
  max_file_size_mb: 100         # Skip files larger than this

# Vector store (ChromaDB)
vector_store:
  persist_dir: "output/knowledge_base"
  default_collection: "lab_documents"
  distance_metric: "cosine"
  top_k: 10                     # Retrieved chunks per query

# Literature search
research:
  enabled: true
  sources:
    - "semantic_scholar"        # Free API, no key required
    - "arxiv"                   # Free API
    - "pubmed"                  # Free API (NCBI E-utilities)
  max_results_per_query: 10
  max_content_chars: 3000       # Longer for scientific abstracts
  crossref_email: ""            # Optional: for polite Crossref API usage

# Output settings
output:
  transcripts_dir: "output/transcripts"
  audio_dir: "output/audio"
  knowledge_base_dir: "output/knowledge_base"
  save_analysis_state: true
  save_thinking: false
  report_format: "markdown"     # markdown | json | both

# TTS podcast settings
tts:
  enabled: false
  engine: "edge-tts"
  voices:
    pi: "en-US-GuyNeural"
    reviewer: "en-GB-SoniaNeural"
    methodologist: "en-US-AndrewNeural"
